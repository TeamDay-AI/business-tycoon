# Sync main → gh-pages on every push (GitHub Pages deploys from gh-pages via legacy builder)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to gh-pages
        run: git push origin HEAD:gh-pages --force
